limit_req_zone $binary_remote_addr zone=nautica_api_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=nautica_admin_login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=nautica_conn_per_ip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name testwebsite.bytecore.hr;
    return 301 https://testwebsite.bytecore.hr$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.testwebsite.bytecore.hr;
    return 301 https://testwebsite.bytecore.hr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.testwebsite.bytecore.hr;

    ssl_certificate     /etc/ssl/cloudflare/bytecore/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/bytecore/origin.key;

    return 301 https://testwebsite.bytecore.hr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name testwebsite.bytecore.hr;

    ssl_certificate     /etc/ssl/cloudflare/bytecore/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/bytecore/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:20m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' https://www.instagram.com https://platform.instagram.com https://connect.facebook.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.fbcdn.net https://*.facebook.com https://*.instagram.com https://*.cdninstagram.com; font-src 'self' data:; connect-src 'self' https://graph.facebook.com https://www.instagram.com https://platform.instagram.com https://www.facebook.com; frame-src 'self' https://www.facebook.com https://web.facebook.com https://www.instagram.com https://platform.instagram.com; media-src 'self' blob:;" always;

    if ($http_cf_ray = "") {
        return 444;
    }

    root /websites/nautica/frontend;
    index index.html;

    client_max_body_size 16m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 20s;
    send_timeout 15s;
    reset_timedout_connection on;
    server_tokens off;
    etag on;
    charset utf-8;
    charset_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml application/atom+xml image/svg+xml;

    limit_conn nautica_conn_per_ip 30;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        font/woff2
        audio/mpeg
        audio/ogg;

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|webp|avif|ico|mp3|ogg|woff2?|ttf|eot)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location = /site.webmanifest {
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location /uploads/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Content-Disposition "inline" always;
        alias /websites/nautica/uploads/;
        try_files $uri =404;
    }

    location = /api/admin/login {
        limit_req zone=nautica_admin_login burst=5 nodelay;

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        limit_req zone=nautica_api_per_ip burst=40 nodelay;

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8787/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-store" always;
    }

    location = /ready {
        proxy_pass http://127.0.0.1:8787/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /admin/ {
        expires -1;
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /spa.html;
    }

    location = /admin {
        expires -1;
        add_header Cache-Control "no-store" always;
        try_files $uri /spa.html;
    }

    location / {
        expires 5m;
        add_header Cache-Control "public, max-age=300, s-maxage=3600, stale-while-revalidate=86400" always;
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/testwebsite.bytecore.hr.access.log main_cf;
    error_log  /var/log/nginx/testwebsite.bytecore.hr.error.log warn;
}
